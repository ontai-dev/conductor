---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: packreceipts.runner.ontai.dev
spec:
  group: runner.ontai.dev
  names:
    kind: PackReceipt
    listKind: PackReceiptList
    plural: packreceipts
    shortNames:
    - pr
    singular: packreceipt
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetClusterRef
      name: Cluster
      type: string
    - jsonPath: .spec.clusterPackRef.name
      name: Pack
      type: string
    - jsonPath: .spec.clusterPackRef.version
      name: Version
      type: string
    - jsonPath: .spec.signatureVerified
      name: Verified
      type: boolean
    - jsonPath: .status.driftStatus
      name: Drift
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PackReceipt is the target cluster record of a delivered ClusterPack
          version. Created and maintained exclusively by the Conductor Deployment in
          ont-system on the target cluster. Never authored by humans or other controllers.
          One PackReceipt per deployed pack per target cluster. conductor-schema.md §10,
          §15; wrapper-schema.md §5.
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation
              of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this
              object represents.
            type: string
          metadata:
            type: object
          spec:
            description: PackReceiptSpec is the immutable declaration written by the
              target cluster Conductor when it acknowledges delivery of a ClusterPack.
              Sealed after creation — no controller mutates it after the first write.
              INV-026.
            properties:
              clusterPackRef:
                description: ClusterPackRef identifies the specific ClusterPack version
                  this receipt records delivery for.
                properties:
                  name:
                    description: Name is the ClusterPack CR name on the management cluster.
                    type: string
                  version:
                    description: Version is the semver version of the ClusterPack being
                      delivered.
                    type: string
                required:
                - name
                - version
                type: object
              packSignature:
                description: PackSignature is the base64-encoded Ed25519 signature
                  written by the management cluster Conductor on the PackInstance CR.
                  The target cluster Conductor verifies this signature before setting
                  signatureVerified=true. INV-026.
                type: string
              signatureVerified:
                description: SignatureVerified is true when the target cluster Conductor
                  has successfully verified packSignature against the management cluster's
                  public signing key. A PackReceipt where signatureVerified=false is a
                  security incident. wrapper-schema.md §5, conductor-schema.md §10.
                type: boolean
              targetClusterRef:
                description: TargetClusterRef identifies the target cluster this receipt
                  was created on. Matches the cluster-ref flag the Conductor Deployment
                  was started with.
                type: string
            required:
            - clusterPackRef
            - targetClusterRef
            type: object
          status:
            description: PackReceiptStatus is the mutable state maintained by the target
              cluster Conductor during receipt reconciliation and drift detection loops.
              conductor-schema.md §10, §15.
            properties:
              conditions:
                description: Conditions is the standard Kubernetes condition list for
                  PackReceipt. Condition types — Delivered, SignatureVerified, Drifted,
                  SecurityViolation. conductor-schema.md §15.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deliveredAt:
                description: DeliveredAt is the timestamp when the target cluster Conductor
                  first acknowledged delivery of this ClusterPack version.
                format: date-time
                type: string
              driftStatus:
                description: DriftStatus is the current drift state of the live cluster
                  relative to the expected state from this ClusterPack version. Updated
                  by the drift detection loop. wrapper-schema.md §8.
                enum:
                - InSync
                - Drifted
                - Unknown
                type: string
              driftSummary:
                description: DriftSummary is a human-readable description of the detected
                  drift, if any. Empty when driftStatus is InSync or Unknown.
                type: string
              lastDriftCheckAt:
                description: LastDriftCheckAt is the timestamp of the most recent drift
                  detection check performed by the Conductor drift detection loop.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
