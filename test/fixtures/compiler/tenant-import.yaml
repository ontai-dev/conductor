name: ccs-dev
namespace: seam-tenant-ccs-dev
mode: import
role: tenant
importExistingCluster: true
capi:
  enabled: false
bootstrap:
  controlPlaneEndpoint: "https://10.20.1.10:6443"
  talosVersion: "v1.9.3"
  kubernetesVersion: "1.32.3"
  installDisk: "/dev/vda"
  nodes:
    - hostname: ccs-dev-cp1
      ip: "10.20.1.2"
      role: init
    - hostname: ccs-dev-cp2
      ip: "10.20.1.3"
      role: controlplane
    - hostname: ccs-dev-w1
      ip: "10.20.1.4"
      role: worker
registryMirrors:
  - registry: ghcr.io
    endpoints:
      - http://10.20.0.1:5000
  - registry: registry.k8s.io
    endpoints:
      - http://10.20.0.1:5000
# machineConfigPaths is injected by tests at runtime -- not present in static fixture.
